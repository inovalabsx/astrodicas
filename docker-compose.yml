version: '3.8'

services:
  app:
    build: .
    container_name: astrodicas-app
    env_file: .env
    depends_on:
      redis:
        condition: service_started
    volumes:
      - ./src:/app/src
      - ./static:/app/static
    ports:
      - "8000:8000"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: astrodicas-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
